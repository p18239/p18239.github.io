<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Parser - Ultra Clean Edition</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.8.0/styles/github.min.css">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.8.0/highlight.min.js"></script>

    <style>
        /* 样式保持不变，追求极致阅读体验 */
        :root {
            --bg: #f3f4f6; --panel: #ffffff; --border: #e5e7eb;
            --accent: #2563eb; --accent-hover: #1d4ed8;
            --text-main: #111827; --text-muted: #6b7280;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { padding: 12px 24px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; z-index: 100; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .logo { font-weight: 600; font-size: 16px; display: flex; align-items: center; gap: 8px; }
        .logo span { color: var(--accent); }
        .toolbar { display: flex; gap: 12px; }
        button { background: var(--panel); border: 1px solid var(--border); color: var(--text-muted); padding: 6px 12px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; transition: var(--transition); display: flex; align-items: center; gap: 6px; }
        button:hover { background: #f9fafb; color: var(--text-main); border-color: #d1d5db; }
        button.primary { background: var(--accent); color: white; border-color: var(--accent); }
        button.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
        .main-container { display: flex; flex: 1; padding: 16px; gap: 16px; height: calc(100vh - 53px); transition: var(--transition); }
        .editor-box, .preview-box { background: var(--panel); border-radius: 12px; border: 1px solid var(--border); display: flex; flex-direction: column; box-shadow: var(--shadow); transition: var(--transition); overflow: hidden; flex: 1; }
        .main-container.read-only-mode .editor-box { flex: 0; opacity: 0; margin: 0; padding: 0; border: none; overflow: hidden; }
        .main-container.read-only-mode .preview-box { flex: 1; max-width: 900px; margin: 0 auto; }
        .label { padding: 12px 16px; font-size: 12px; font-weight: 600; color: var(--text-muted); border-bottom: 1px solid var(--border); background: #fcfcfd; letter-spacing: 0.05em; }
        textarea { flex: 1; border: none; padding: 20px; font-family: 'Fira Code', monospace; font-size: 14px; line-height: 1.6; outline: none; resize: none; background: transparent; color: var(--text-main); }
        .preview-content { flex: 1; overflow-y: auto; padding: 32px; line-height: 1.75; scroll-behavior: smooth; }
        .markdown-body { font-size: 15px; color: #374151; }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 { margin-top: 1.5em; margin-bottom: 0.75em; color: var(--text-main); font-weight: 600; }
        .markdown-body h1 { font-size: 1.75em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
        .markdown-body h2 { font-size: 1.4em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
        .markdown-body p { margin-bottom: 1.2em; }
        .markdown-body code { background: #f3f4f6; padding: 0.2em 0.4em; border-radius: 4px; font-size: 0.85em; font-family: 'Fira Code', monospace; color: #ef4444; }
        .markdown-body pre { background: #1e293b; padding: 16px; border-radius: 8px; margin-bottom: 1.2em; overflow-x: auto; }
        .markdown-body pre code { background: transparent; color: #e2e8f0; font-size: 0.9em; padding: 0; }
        .markdown-body blockquote { border-left: 4px solid var(--border); padding-left: 1em; color: var(--text-muted); margin-bottom: 1.2em; }
        .markdown-body ul, .markdown-body ol { padding-left: 1.5em; margin-bottom: 1.2em; }
        .katex-display { margin: 1.2em 0; overflow-x: auto; padding: 10px 0; }
        @media (max-width: 768px) {
            header { padding: 12px 16px; }
            .toolbar button span { display: none; }
            .main-container { flex-direction: column; padding: 12px; gap: 12px; }
            .editor-box, .preview-box { flex: none; height: 50%; }
            .main-container.read-only-mode .preview-box { height: 100%; }
            .preview-content { padding: 20px; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo"><span>Math</span>Protect <span style="font-size: 10px; background: #e5e7eb; color: #4b5563; padding: 2px 6px; border-radius: 4px; margin-left: 4px;">ULTRA CLEAN v2</span></div>
    <div class="toolbar">
        <button id="btn-copy" title="复制原文">📋 <span>复制原文</span></button>
        <button id="btn-clear" title="清空内容">🗑️ <span>清空</span></button>
        <button id="btn-read" class="primary" title="沉浸阅读模式">📖 <span>纯净阅读</span></button>
    </div>
</header>

<div class="main-container" id="main-container">
    <div class="editor-box">
        <div class="label">INPUT (AUTO-SAVED)</div>
        <textarea id="editor" placeholder="在此粘贴..."></textarea>
    </div>
    <div class="preview-box">
        <div class="label">PREVIEW</div>
        <div id="preview" class="preview-content markdown-body"></div>
    </div>
</div>

<script>
    const editor = document.getElementById('editor');
    const preview = document.getElementById('preview');
    const mainContainer = document.getElementById('main-container');
    const btnRead = document.getElementById('btn-read');
    const btnClear = document.getElementById('btn-clear');
    const btnCopy = document.getElementById('btn-copy');

    // 开启 Marked 的智能换行 (保留单行回车)，极大提升 AI 文本阅读体验
    marked.use({ breaks: true, gfm: true });

    function updatePreview() {
        let text = editor.value;
        localStorage.setItem('mathprotect_draft', text);

        if (!text.trim()) {
            preview.innerHTML = '<div style="text-align: center; color: #9ca3af; margin-top: 40px;">等待输入内容...</div>';
            return;
        }

        const mathVault = [];
        let vaultIndex = 0;
        const wrapMath = (match) => {
            const key = `MATHPROTECT_${vaultIndex++}`;
            mathVault.push({ key, content: match });
            return key;
        };

        // 【修复 1】自动纠错 AI 经常搞错的粗体前后空格问题
        // 将 `** 加粗文本 **` 强行修正为 `**加粗文本**`，确保 Markdown 引擎必定解析
        text = text.replace(/\*\*[ \t]+(.*?)[ \t]+\*\*/g, '**$1**');

        // 【修复 2】兼容老旧浏览器，移除了导致极少数设备正则崩溃的 `v` 标志
        text = text.replace(/(?<!\$)(?<!\$\$)\\begin\{([a-z*]+)\}(.*?)\\end\{\1\}(?!\$)(?!\$\$)/gs, '$$\n\\begin{$1}$2\\end{$1}\n$$');

        // 提取保护数学公式
        text = text.replace(/\$\$(.*?)\$\$/gs, wrapMath);
        text = text.replace(/\\\[(.*?)\\\]/gs, wrapMath);
        text = text.replace(/(?<!\$)\$(?!\s)(.*?\S)(?<!\s)\$(?!\d)/g, wrapMath);
        text = text.replace(/\\\(.*?\\\)/g, wrapMath);

        // 【修复 3】核心改动：清理正则防误杀换行
        // 将所有的 \s 换成了 [ \t]（只匹配空格和制表符）。
        // 这样 被清理时，只会删掉它前面的空格，坚决不吞掉上一行的回车！段落彻底安全了。
        text = text.replace(/[ \t]*\[(?:cite:)?[ \t]*\^?[\d\s,\-]+\](?![ \t]*[:\(])|[ \t]*\[cite_(?:start|end|url)[^\]]*\]/gi, '');

        // 渲染 Markdown
        let html = marked.parse(text);

        // 还原公式
        mathVault.forEach(item => {
            html = html.replace(item.key, item.content);
        });

        preview.innerHTML = html;

        // 渲染 KaTeX
        renderMathInElement(preview, {
            delimiters: [
                {left: '$$', right: '$$', display: true},
                {left: '\\[', right: '\\]', display: true},
                {left: '$', right: '$', display: false},
                {left: '\\(', right: '\\)', display: false}
            ],
            throwOnError: false
        });

        // 渲染高亮
        preview.querySelectorAll('pre code').forEach((el) => {
            hljs.highlightElement(el);
        });
    }

    let renderTimer;
    editor.addEventListener('input', () => {
        clearTimeout(renderTimer);
        renderTimer = setTimeout(updatePreview, 200);
    });

    let isReadOnly = false;
    btnRead.addEventListener('click', () => {
        isReadOnly = !isReadOnly;
        mainContainer.classList.toggle('read-only-mode', isReadOnly);
        if (isReadOnly) {
            btnRead.innerHTML = '✏️ <span>退出阅读</span>';
            btnRead.classList.remove('primary');
        } else {
            btnRead.innerHTML = '📖 <span>纯净阅读</span>';
            btnRead.classList.add('primary');
        }
    });

    btnClear.addEventListener('click', () => {
        if(confirm('确定要清空当前所有内容吗？')) {
            editor.value = '';
            updatePreview();
        }
    });

    btnCopy.addEventListener('click', () => {
        if (!editor.value) return;
        navigator.clipboard.writeText(editor.value).then(() => {
            const originalText = btnCopy.innerHTML;
            btnCopy.innerHTML = '✅ <span>已复制</span>';
            setTimeout(() => { btnCopy.innerHTML = originalText; }, 2000);
        });
    });

    window.addEventListener('DOMContentLoaded', () => {
        const savedDraft = localStorage.getItem('mathprotect_draft');
        if (savedDraft) {
            editor.value = savedDraft;
        } else {
            // 默认填充了你刚刚报错的这段文本，可以立刻看到修复效果
            editor.value = "**① 题目分析（已知条件 + 求解目标）**\n已知由组分A和组分B组成的二元溶液中，组分A的物质的量 $n_A=1$ mol，组分B的摩尔分数 $x_B=0.8$。";
        }
        updatePreview();
    });
</script>

</body>
</html>
