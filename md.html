<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Markdown & LaTeX 渲染引擎</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.8.0/styles/github.min.css" id="hl-style">
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.8.0/highlight.min.js"></script>

    <style>
        :root {
            --bg-color: #f3f4f6;
            --panel-bg: #ffffff;
            --border-color: #e5e7eb;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: var(--panel-bg);
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            z-index: 10;
        }

        header h1 {
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        header h1::before {
            content: '✨';
        }

        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
            padding: 16px;
            gap: 16px;
        }

        /* 编辑器区域 */
        .editor-pane {
            flex: 1;
            background: var(--panel-bg);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .pane-header {
            padding: 12px 16px;
            background: #f8fafc;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        textarea {
            flex: 1;
            width: 100%;
            border: none;
            resize: none;
            padding: 20px;
            font-family: 'Fira Code', monospace;
            font-size: 0.9rem;
            line-height: 1.6;
            color: var(--text-main);
            outline: none;
            background: transparent;
        }

        /* 预览区域 */
        .preview-pane {
            flex: 1;
            background: var(--panel-bg);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .preview-content {
            flex: 1;
            overflow-y: auto;
            padding: 32px;
            scroll-behavior: smooth;
        }

        /* 极致优化的 Markdown 渲染样式 */
        .markdown-body {
            font-size: 1rem;
            line-height: 1.75;
            word-wrap: break-word;
        }
        
        .markdown-body h1, .markdown-body h2, .markdown-body h3 {
            margin-top: 1.5em;
            margin-bottom: 0.5em;
            font-weight: 600;
            line-height: 1.25;
        }
        
        .markdown-body h1 { font-size: 1.75rem; border-bottom: 1px solid var(--border-color); padding-bottom: .3em; }
        .markdown-body h2 { font-size: 1.5rem; border-bottom: 1px solid var(--border-color); padding-bottom: .3em; }
        .markdown-body p { margin-bottom: 1em; }
        
        .markdown-body code {
            font-family: 'Fira Code', monospace;
            background-color: rgba(175, 184, 193, 0.2);
            padding: 0.2em 0.4em;
            border-radius: 6px;
            font-size: 85%;
        }
        
        .markdown-body pre {
            background-color: #f6f8fa;
            border-radius: 8px;
            padding: 16px;
            overflow: auto;
            margin-bottom: 1em;
            border: 1px solid var(--border-color);
        }

        .markdown-body pre code {
            background-color: transparent;
            padding: 0;
            font-size: 0.9rem;
            color: #24292f;
        }

        .markdown-body blockquote {
            padding: 0 1em;
            color: var(--text-muted);
            border-left: 0.25em solid var(--border-color);
            margin: 0 0 1em 0;
            background: #f9fafb;
            padding-block: 0.5em;
            border-radius: 0 8px 8px 0;
        }

        .markdown-body ul, .markdown-body ol { padding-left: 2em; margin-bottom: 1em; }
        
        /* KaTeX 公式自适应溢出滚动 */
        .katex-display {
            overflow-x: auto;
            overflow-y: hidden;
            padding-block: 0.5em;
        }

        /* 响应式：小屏幕自动改为上下布局 */
        @media (max-width: 768px) {
            .container { flex-direction: column; }
        }
    </style>
</head>
<body>

    <header>
        <h1>AI 文本解析引擎</h1>
        <div style="font-size: 0.85rem; color: var(--text-muted);">支持实时 Markdown + LaTeX + 代码高亮</div>
    </header>

    <div class="container">
        <div class="editor-pane">
            <div class="pane-header">Input (RAW)</div>
            <textarea id="input" placeholder="将 AI 生成的 Markdown 或数学公式粘贴到这里... 引擎会自动修复格式问题。"></textarea>
        </div>
        
        <div class="preview-pane">
            <div class="pane-header">Preview (RENDERED)</div>
            <div class="preview-content">
                <div id="output" class="markdown-body">渲染结果将显示在这里...</div>
            </div>
        </div>
    </div>

    <script>
        const inputEl = document.getElementById('input');
        const outputEl = document.getElementById('output');

        // 核心渲染逻辑
        function renderContent() {
            let rawText = inputEl.value;
            if (!rawText.trim()) {
                outputEl.innerHTML = '<p style="color: #9ca3af; text-align: center; margin-top: 2rem;">等待输入...</p>';
                return;
            }

            const mathStore = [];
            let mathIndex = 0;

            // 工具函数：提取并保存数学公式，替换为安全的占位符
            const storeMath = (match) => {
                const placeholder = `__MATH_PROTECTOR_${mathIndex}__`;
                mathStore[mathIndex] = match;
                mathIndex++;
                return placeholder;
            };

            // 【特性 1：自动纠错/兼容】
            // 如果 AI 直接输出了 \begin{aligned} ... \end{aligned} 但没有用 $$ 包裹（兼容不带 $ 的网页浏览），
            // 这里利用正则将其自动补全 $$ 包裹，使 KaTeX 能够识别。
            rawText = rawText.replace(/(?<!\$)(?<!\$\$)\\begin\{([a-z*]+)\}(.*?)\\end\{\1\}(?!\$)(?!\$\$)/gvs, '$$$$\n\\begin{$1}$2\\end{$1}\n$$$$');

            // 【特性 2：转写精准防干扰】
            // 在交给 Marked.js 解析之前，先把所有的 LaTeX 公式“抠”出来。
            // 否则类似 $x_1 + x_2$ 里的下划线会被 Markdown 错误解析成 <em> 斜体。
            
            // 1. 保护块级公式 (Display Math): $$...$$ 和 \[...\]
            rawText = rawText.replace(/\$\$(.*?)\$\$/gs, storeMath);
            rawText = rawText.replace(/\\\[(.*?)\\\]/gs, storeMath);

            // 2. 保护行内公式 (Inline Math): $...$ 和 \(...\)
            // 负向先行断言和后行断言防止把正常的美元价格（如 $100）误认为公式
            rawText = rawText.replace(/(?<!\$)\$(?!\s)(.*?\S)(?<!\s)\$(?!\d)/gs, storeMath);
            rawText = rawText.replace(/\\\((.*?)\\\)/gs, storeMath);

            // 【特性 3：Markdown 渲染】
            let htmlResult = marked.parse(rawText);

            // 【特性 4：公式还原】
            // 把之前抠出来的 LaTeX 公式原封不动地替换回去
            mathStore.forEach((mathText, index) => {
                htmlResult = htmlResult.replace(`__MATH_PROTECTOR_${index}__`, mathText);
            });

            // 写入 DOM
            outputEl.innerHTML = htmlResult;

            // 【特性 5：KaTeX 渲染】
            try {
                renderMathInElement(outputEl, {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '\\[', right: '\\]', display: true},
                        {left: '$', right: '$', display: false},
                        {left: '\\(', right: '\\)', display: false}
                    ],
                    throwOnError: false, // 自动容错：如果 AI 生成了错误的语法，公式不崩溃，而是显示为红色的原生代码
                    errorColor: '#ef4444' 
                });
            } catch (e) {
                console.error("KaTeX 渲染出错:", e);
            }

            // 【特性 6：代码块高亮】
            document.querySelectorAll('pre code').forEach((block) => {
                hljs.highlightElement(block);
            });
        }

        // 监听输入，实现实时渲染 (带简单的防抖功能提升性能)
        let timeout;
        inputEl.addEventListener('input', () => {
            clearTimeout(timeout);
            timeout = setTimeout(renderContent, 300);
        });

        // 初始示例数据
        inputEl.value = `# AI 响应测试页面

这是一段普通的正文测试。以下是代码演示：

\`\`\`python
def calculate_energy(mass):
    c = 299792458 # 光速
    return mass * (c ** 2)
\`\`\`

## 复杂公式兼容测试

1. **标准块级公式**：
$$ E = mc^2 $$

2. **标准行内公式**：求解方程 $ax^2 + bx + c = 0$ 的根。

3. **兼容无 $ 符号的块级环境 (自动纠错补全)**：
\\begin{aligned}
\\nabla \\times \\vec{\\mathbf{B}} -\\, \\frac1c\\, \\frac{\\partial\\vec{\\mathbf{E}}}{\\partial t} & = \\frac{4\\pi}{c}\\vec{\\mathbf{j}} \\\\
\\nabla \\cdot \\vec{\\mathbf{E}} & = 4 \\pi \\rho \\\\
\\end{aligned}

4. **转义下划线防护测试**（确保这里的 $A_{i,j}$ 不会变成斜体）：
当计算矩阵 $A_{i,j}$ 时，变量 $x_1$ 和 $x_2$ 的结果为：\\[ \\sum_{i=1}^{n} x_i = 1 \\]`;
        
        // 触发首次渲染
        renderContent();
    </script>
</body>
</html>
